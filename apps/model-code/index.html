<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Coder</title>
    <meta name="description" content="Learn OpenAI-style Python coding against a local SmolLM2 model in the browser.">
    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <h1>Model Coder</h1>
                <p>Write OpenAI-style Python. Run it locally with SmolLM2 in your browser.</p>
            </div>
            <div class="topbar-controls">
                <div class="template-picker">
                    <label for="template-select" class="template-label" title="Choose sample" aria-label="Choose sample">&#128195;</label>
                    <select id="template-select" aria-label="Template picker" title="Choose sample">
                        <option value="blank-page" selected>Blank Page</option>
                        <option value="simple-chat-chatcompletions">Simple chat (ChatCompletions API)</option>
                        <option value="simple-chat-responses">Simple chat (Responses API)</option>
                        <option value="conversation-tracking-chatcompletions">Conversation Tracking (ChatCompletions API)</option>
                        <option value="conversation-tracking-responses">Conversation Tracking (Responses API)</option>
                        <option value="streaming-responses">Streaming (Responses API)</option>
                        <option value="async-chat">Async chat</option>
                    </select>
                </div>
                <button id="run-btn" type="button" disabled title="Run Code" aria-label="Run Code">&#9654;</button>
                <button id="stop-btn" type="button" class="secondary" disabled title="Stop Run" aria-label="Stop Run">&#9209;</button>
                <button id="reset-layout-btn" type="button" class="secondary" title="Reset layout" aria-label="Reset layout">&#127529;</button>
                <button id="theme-btn" type="button" class="secondary" title="Theme" aria-label="Theme" aria-pressed="false">&#9680;</button>
                <button id="retry-btn" type="button" class="secondary" hidden>Retry Model Load</button>
            </div>
        </header>

        <section class="status-row" aria-live="polite">
            <div class="status-pill" id="runtime-status">PyScript loading...</div>
            <div class="status-pill" id="model-status">Model initializing...</div>
        </section>

        <main class="workspace" role="main">
            <section class="panel panel-editor" aria-label="Python editor">
                <div class="panel-header">
                    <h2>Editor</h2>
                    <span id="saved-indicator">Not run yet</span>
                </div>
                <div id="editor-container" class="panel-body"></div>

                <script
                    id="python-editor"
                    type="py-editor"
                    target="editor-container"
                    env="model-coder"
                    config='{"packages": ["numpy", "pandas", "matplotlib", "scikit-learn"]}'
                ></script>
            </section>

            <div
                id="pane-splitter"
                class="pane-splitter"
                role="separator"
                aria-label="Resize editor and terminal panes"
                aria-orientation="horizontal"
                tabindex="0"
            ></div>

            <section class="panel panel-terminal" aria-label="Python terminal">
                <div class="panel-header">
                    <h2>Terminal</h2>
                    <span>Interactive print() and input()</span>
                </div>
                <div id="terminal-container" class="panel-body"></div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
