<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vosk Web Speech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vosk-browser@0.0.8/dist/vosk.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vosk Speech-to-Text</h1>
            <p>On-device transcription powered by WebAssembly</p>
        </header>

        <main>
            <div class="status-indicator">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Loading Model...</span>
            </div>

            <button id="micBtn" class="mic-btn" disabled>
                <div class="mic-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
                <div class="rings"></div>
            </button>

            <div class="transcript-container">
                <div id="welcomeText" class="welcome-text">Click the microphone to start speaking</div>
                <div id="transcript" class="transcript-text"></div>
                <div id="partial" class="partial-text"></div>
            </div>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
